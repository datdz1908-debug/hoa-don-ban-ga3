<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hóa Đơn Bán Gà - Chụp Ảnh iPhone</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #e0e0e0; 
            padding: 5px;
            font-family: 'Courier New', monospace;
        }
        
        /* PHẦN HÓA ĐƠN - Đây là phần sẽ được chụp */
        .bill {
            max-width: 400px;
            margin: 0 auto 10px;
            background: white;
            border-radius: 10px;
            border: 2px solid #333;
        }
        
        #billCapture {
            background: white;
            padding: 12px 10px;
            border-radius: 10px;
        }
        
        .bill-header {
            text-align: center;
            border-bottom: 2px dashed #333;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }
        .bill-header h1 {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .bill-header .shop {
            font-size: 14px;
            color: #c00;
            font-weight: bold;
        }
        
        .customer-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            padding: 5px 0;
            border-bottom: 1px dotted #333;
        }
        
        .items-table {
            width: 100%;
            font-size: 13px;
            margin-bottom: 10px;
            border-collapse: collapse;
        }
        .items-table th {
            text-align: left;
            border-bottom: 1px solid #333;
            padding: 3px 0;
            font-size: 12px;
        }
        .items-table td {
            padding: 2px 0;
            vertical-align: middle;
        }
        .items-table .ten {
            width: 90px;
            font-weight: bold;
        }
        .items-table .kg {
            text-align: center;
            width: 50px;
        }
        .items-table .gia {
            text-align: right;
            width: 70px;
        }
        .items-table .tien {
            text-align: right;
            width: 70px;
            font-weight: bold;
        }
        
        .total-section {
            border-top: 2px double #333;
            border-bottom: 2px double #333;
            padding: 8px 0;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
        }
        .total-section .amount {
            color: #c00;
        }
        
        .footer {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-top: 15px;
            color: #555;
        }
        .signature {
            text-align: right;
        }
        
        /* PHẦN ĐIỀU KHIỂN */
        .control-panel {
            max-width: 400px;
            margin: 0 auto;
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #999;
        }
        .control-panel h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #333;
            text-align: center;
        }
        
        .input-row {
            display: flex;
            align-items: center;
            gap: 5px;
            margin: 5px 0;
            background: white;
            padding: 5px 8px;
            border-radius: 5px;
        }
        .input-row .label {
            width: 60px;
            font-weight: bold;
            font-size: 14px;
        }
        .input-row input {
            flex: 1;
            padding: 8px;
            border: 1px solid #999;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .btn-group {
            display: flex;
            gap: 8px;
            margin: 15px 0;
        }
        .btn {
            flex: 1;
            padding: 12px 0;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            font-size: 14px;
            cursor: pointer;
            -webkit-appearance: none;
        }
        .btn-luu { background: #28a745; }
        .btn-xoa { background: #dc3545; }
        .btn-moi { background: #17a2b8; }
        .btn-chup { 
            background: #ff6b6b; 
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin-top: 5px;
        }
        
        .old-customer {
            margin: 10px 0;
        }
        select {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border-radius: 5px;
            border: 1px solid #999;
        }
        
        /* Khung hiển thị ảnh cho iPhone */
        .image-preview {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
            padding: 20px;
        }
        .image-preview.show {
            display: flex;
        }
        .preview-image {
            max-width: 100%;
            max-height: 70vh;
            border: 3px solid white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .preview-text {
            color: white;
            font-size: 18px;
            margin: 20px 0;
            text-align: center;
        }
        .preview-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            margin: 5px;
            width: 200px;
        }
        .preview-btn.close {
            background: #6c757d;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px 30px;
            border-radius: 15px;
            z-index: 10001;
            display: none;
            font-size: 18px;
        }
        .loading.show {
            display: block;
        }
        
        #inputItems {
            max-height: 250px;
            overflow-y: auto;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 5px;
        }
    </style>
</head>
<body>
    <!-- PHẦN HÓA ĐƠN - SẼ ĐƯỢC CHỤP -->
    <div class="bill">
        <div id="billCapture">
            <div class="bill-header">
                <h1>🐔 BÁN GÀ 🐔</h1>
                <div class="shop">CHUYÊN GÀ TA - GÀ THẢ VƯỜN</div>
            </div>
            
            <div class="customer-info">
                <span>Khách: <span id="displayTenKhach">Khách lẻ</span></span>
                <span>Giờ: <span id="displayThoiGian"></span></span>
            </div>
            
            <table class="items-table">
                <thead>
                    <tr>
                        <th class="ten">Món</th>
                        <th class="kg">Kg</th>
                        <th class="gia">Giá</th>
                        <th class="tien">Tiền</th>
                    </tr>
                </thead>
                <tbody id="billItemsBody"></tbody>
            </table>
            
            <div class="total-section">
                <span class="label">Tổng cộng</span>
                <span class="amount" id="displayTotal">0 VNĐ</span>
            </div>
            
            <div class="footer">
                <div>Cảm ơn quý khách!</div>
                <div class="signature">
                    <div>Ngày <span id="displayNgay"></span></div>
                    <div>Nhân viên: ________</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- PHẦN ĐIỀU KHIỂN -->
    <div class="control-panel">
        <h3>✏️ NHẬP HÓA ĐƠN</h3>
        
        <div class="input-row">
            <span class="label">Tên:</span>
            <input type="text" id="inputTenKhach" placeholder="Nhập tên khách" value="Khách lẻ" oninput="capNhatHienThi()">
        </div>
        
        <div class="old-customer">
            <select id="chonKhach" onchange="loadKhachHang()">
                <option value="Khách lẻ">📋 Chọn khách cũ</option>
            </select>
        </div>
        
        <div id="inputItems"></div>
        
        <div class="btn-group">
            <button class="btn btn-luu" onclick="luuGiaKhach()">💾 Lưu</button>
            <button class="btn btn-xoa" onclick="xoaGiaDaChon()">🗑️ Xóa</button>
            <button class="btn btn-moi" onclick="resetAll()">🔄 Mới</button>
        </div>
        
        <!-- NÚT CHỤP ẢNH DUY NHẤT - TỐI ƯU CHO IPHONE -->
        <button class="btn btn-chup" onclick="chupHoaDon()">📸 CHỤP HÓA ĐƠN</button>
    </div>
    
    <!-- KHUNG HIỂN THỊ ẢNH CHO IPHONE -->
    <div class="image-preview" id="imagePreview">
        <img class="preview-image" id="previewImage" src="">
        <div class="preview-text" id="previewText">✅ Nhấn giữ ảnh để lưu vào máy</div>
        <button class="preview-btn" onclick="luuAnhTrucTiep()">💾 Lưu ảnh</button>
        <button class="preview-btn close" onclick="dongPreview()">✖️ Đóng</button>
    </div>
    
    <div class="loading" id="loading">🔄 Đang xử lý...</div>

    <script>
        // DANH SÁCH MÓN
        const menu = ['Đùi','Cánh','Góc 4','Đầu','Tam Hoàng','Ta','Xương','X.đẹp','Má','Tỏi','Philê','C.bầm','Chân','Gan','BỌNG','MỀ'];
        
        // TELEGRAM WEB APP
        let tg = null;
        let currentImageData = null;
        
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        }
        
        // Hiển thị loading
        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }
        
        // Tạo phần nhập liệu
        function taoInputItems() {
            let html = '';
            for(let i=0; i<menu.length; i++) {
                html += `
                    <div class="input-row">
                        <span class="label" style="width:60px;">${menu[i]}:</span>
                        <input type="number" id="q${i}" placeholder="kg" value="0" min="0" step="0.1" oninput="capNhatHienThi()">
                        <input type="number" id="p${i}" placeholder="giá" value="0" min="0" step="1000" oninput="capNhatHienThi()">
                    </div>
                `;
            }
            document.getElementById('inputItems').innerHTML = html;
        }
        
        // Tạo bảng hiển thị
        function taoBangHienThi() {
            let html = '';
            for(let i=0; i<menu.length; i++) {
                html += `
                    <tr>
                        <td class="ten">${menu[i]}</td>
                        <td class="kg" id="displayQ${i}">-</td>
                        <td class="gia" id="displayP${i}">-</td>
                        <td class="tien" id="displayT${i}">-</td>
                    </tr>
                `;
            }
            document.getElementById('billItemsBody').innerHTML = html;
        }
        
        // Cập nhật hiển thị
        function capNhatHienThi() {
            document.getElementById('displayTenKhach').innerText = document.getElementById('inputTenKhach').value || 'Khách lẻ';
            
            let now = new Date();
            let gio = now.getHours().toString().padStart(2,'0');
            let phut = now.getMinutes().toString().padStart(2,'0');
            let ngay = now.getDate().toString().padStart(2,'0');
            let thang = (now.getMonth()+1).toString().padStart(2,'0');
            document.getElementById('displayThoiGian').innerText = `${gio}:${phut}`;
            document.getElementById('displayNgay').innerText = `${ngay}/${thang}`;
            
            let total = 0;
            for(let i=0; i<menu.length; i++) {
                let q = parseFloat(document.getElementById('q'+i).value) || 0;
                let p = parseFloat(document.getElementById('p'+i).value) || 0;
                let t = q * p;
                
                document.getElementById('displayQ'+i).innerText = q > 0 ? q.toFixed(1) : '-';
                document.getElementById('displayP'+i).innerText = p > 0 ? p.toLocaleString('vi-VN') : '-';
                document.getElementById('displayT'+i).innerText = t > 0 ? t.toLocaleString('vi-VN') : '-';
                
                total += t;
            }
            
            document.getElementById('displayTotal').innerText = total.toLocaleString('vi-VN') + ' VNĐ';
        }
        
        // Lưu giá khách
        function luuGiaKhach() {
            let ten = document.getElementById('inputTenKhach').value.trim() || 'Khách lẻ';
            let giaKhach = {};
            
            for(let i=0; i<menu.length; i++) {
                let gia = parseFloat(document.getElementById('p'+i).value) || 0;
                giaKhach[menu[i]] = gia;
            }
            
            let dsKhach = JSON.parse(localStorage.getItem('dsKhachHang')) || {};
            dsKhach[ten] = giaKhach;
            localStorage.setItem('dsKhachHang', JSON.stringify(dsKhach));
            
            capNhatDropdownKhach();
            
            if (tg) {
                tg.showAlert('✅ Đã lưu khách: ' + ten);
            } else {
                alert('✅ Đã lưu ' + ten);
            }
        }
        
        // Tải giá khách
        function loadKhachHang() {
            let ten = document.getElementById('chonKhach').value;
            if (ten === 'Khách lẻ') return;
            
            document.getElementById('inputTenKhach').value = ten;
            
            let dsKhach = JSON.parse(localStorage.getItem('dsKhachHang')) || {};
            let giaKhach = dsKhach[ten] || {};
            
            for(let i=0; i<menu.length; i++) {
                document.getElementById('p'+i).value = giaKhach[menu[i]] || 0;
            }
            capNhatHienThi();
        }
        
        // Xóa khách
        function xoaGiaDaChon() {
            let ten = document.getElementById('chonKhach').value;
            if(ten === 'Khách lẻ') {
                if (tg) {
                    tg.showAlert('❌ Không xóa được');
                } else {
                    alert('❌ Không xóa được');
                }
                return;
            }
            
            if (tg) {
                tg.showConfirm('Xóa khách ' + ten + '?', function(confirmed) {
                    if (confirmed) xoaKhach(ten);
                });
            } else {
                if(confirm('Xóa khách ' + ten + '?')) xoaKhach(ten);
            }
        }
        
        function xoaKhach(ten) {
            let dsKhach = JSON.parse(localStorage.getItem('dsKhachHang')) || {};
            delete dsKhach[ten];
            localStorage.setItem('dsKhachHang', JSON.stringify(dsKhach));
            capNhatDropdownKhach();
            document.getElementById('chonKhach').value = 'Khách lẻ';
            document.getElementById('inputTenKhach').value = 'Khách lẻ';
            loadKhachHang();
        }
        
        // Cập nhật dropdown
        function capNhatDropdownKhach() {
            let dsKhach = JSON.parse(localStorage.getItem('dsKhachHang')) || {};
            let select = document.getElementById('chonKhach');
            select.innerHTML = '<option value="Khách lẻ">📋 Chọn khách cũ</option>';
            
            for(let ten in dsKhach) {
                if(ten !== 'Khách lẻ') {
                    select.innerHTML += `<option value="${ten}">${ten}</option>`;
                }
            }
        }
        
        // Reset
        function resetAll() {
            for(let i=0; i<menu.length; i++) {
                document.getElementById('q'+i).value = 0;
                document.getElementById('p'+i).value = 0;
            }
            document.getElementById('inputTenKhach').value = 'Khách lẻ';
            document.getElementById('chonKhach').value = 'Khách lẻ';
            capNhatHienThi();
        }
        
        // Đóng preview ảnh
        function dongPreview() {
            document.getElementById('imagePreview').classList.remove('show');
        }
        
        // Lưu ảnh trực tiếp (cho nút bấm)
        function luuAnhTrucTiep() {
            if (!currentImageData) return;
            
            const link = document.createElement('a');
            link.download = `hoa_don_${Date.now()}.png`;
            link.href = currentImageData;
            link.click();
            
            if (tg) {
                tg.showAlert('✅ Đã lưu ảnh! Kiểm tra trong mục Downloads');
            }
        }
        
        // 🎯 HÀM CHỤP ẢNH - TỐI ƯU CHO IPHONE
        function chupHoaDon() {
            showLoading(true);
            
            const element = document.getElementById('billCapture');
            
            const options = {
                scale: 3,
                backgroundColor: '#ffffff',
                logging: false,
                allowTaint: true,
                useCORS: true
            };
            
            html2canvas(element, options).then(canvas => {
                showLoading(false);
                
                // Lưu dữ liệu ảnh
                currentImageData = canvas.toDataURL('image/png');
                
                // Hiển thị ảnh trong khung preview
                document.getElementById('previewImage').src = currentImageData;
                document.getElementById('imagePreview').classList.add('show');
                
                // Thông báo Telegram
                if (tg) {
                    tg.showAlert('📸 Đã chụp xong! Nhấn giữ ảnh để lưu vào máy');
                }
                
            }).catch(error => {
                showLoading(false);
                console.error('Lỗi:', error);
                
                if (tg) {
                    tg.showAlert('❌ Lỗi chụp ảnh! Vui lòng chụp màn hình thủ công');
                } else {
                    alert('❌ Lỗi chụp ảnh! Vui lòng chụp màn hình thủ công');
                }
            });
        }
        
        // Khởi tạo
        window.onload = function() {
            taoInputItems();
            taoBangHienThi();
            capNhatDropdownKhach();
            capNhatHienThi();
            
            setInterval(() => {
                let now = new Date();
                let gio = now.getHours().toString().padStart(2,'0');
                let phut = now.getMinutes().toString().padStart(2,'0');
                document.getElementById('displayThoiGian').innerText = `${gio}:${phut}`;
            }, 1000);
        };
    </script>
</body>
</html>
